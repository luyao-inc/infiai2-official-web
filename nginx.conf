server {
    listen 80;
    listen [::]:80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # GEO：机器可读资源直连磁盘文件，避免 try_files 回退到 SPA 的边界情况。
    location = /robots.txt {
        default_type text/plain;
        charset utf-8;
        try_files /robots.txt =404;
    }
    location = /sitemap.xml {
        default_type application/xml;
        charset utf-8;
        try_files /sitemap.xml =404;
    }
    location = /feed.xml {
        default_type application/rss+xml;
        charset utf-8;
        try_files /feed.xml =404;
    }
    location = /llms.txt {
        default_type text/plain;
        charset utf-8;
        try_files /llms.txt =404;
    }
    location = /llms-full.txt {
        default_type text/plain;
        charset utf-8;
        try_files /llms-full.txt =404;
    }
    location = /humans.txt {
        default_type text/plain;
        charset utf-8;
        try_files /humans.txt =404;
    }
    location = /.well-known/ai.txt {
        default_type text/plain;
        charset utf-8;
        try_files /.well-known/ai.txt =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types
        text/css
        application/javascript
        application/json
        image/svg+xml
        text/xml
        application/xml
        text/plain
        application/rss+xml;
}
